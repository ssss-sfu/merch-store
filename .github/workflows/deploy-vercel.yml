# Manual production redeploy only. Automatic deploys run in default.yml after CI passes.
name: Deploy to Vercel (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (Production)
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_PROD }}?buildCache=false"
